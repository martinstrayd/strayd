<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Content Manager</title>
  </head>
  <body>
    <!-- Load Static CMS frontend -->
    <script src="https://unpkg.com/@staticcms/core@latest/dist/static-cms.js"></script>

    <!-- Initialize CMS with external config.yml -->
    <script>
      CMS.init({
        config: {
          load_config_file: true,
          config_file: "config.yml"
        }
      });
    </script>
  </body>
</html>
